name: Infra Plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"
  workflow_dispatch:
    inputs:
      apply:
        description: "Chạy terraform apply thay vì chỉ plan (chỉ dùng thủ công, cẩn thận!)"
        type: boolean
        default: false

env:
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
  TF_VAR_openai_api_key: ${{ secrets.TF_VAR_OPENAI_API_KEY }}

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Cấu hình AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform validate

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment kết quả plan vào PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });

      # apply CHỈ chạy khi trigger thủ công (workflow_dispatch) với input apply=true
      - name: terraform apply (thủ công)
        if: github.event_name == 'workflow_dispatch' && inputs.apply == true
        run: terraform apply -auto-approve tfplan

